version: '3.8'

services:
  invoicefast:
    build:
      context: .
      dockerfile: Dockerfile
    image: invoicefast:latest
    container_name: invoicefast
    restart: unless-stopped
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      # Database - set these in your .env file
      # DB_DRIVER=postgres
      # DB_DSN=postgresql://user:password@postgres:5432/invoicefast?sslmode=disable
      #
      # Critical: Set ENCRYPTION_KEY (32+ chars) and JWT_SECRET (64+ chars)
      # ENCRYPTION_KEY=<your-32-char-key>
      # JWT_SECRET=<your-64-char-secret>
    volumes:
      - invoicefast_data:/app/data
      - invoicefast_templates:/app/templates
      - invoicefast_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - invoicefast_network

  postgres:
    image: postgres:16-alpine
    container_name: invoicefast-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=invoicefast
      - POSTGRES_PASSWORD=${DB_PASSWORD:-change_me}
      - POSTGRES_DB=invoicefast
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoicefast"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - invoicefast_network

  redis:
    image: redis:7-alpine
    container_name: invoicefast-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - invoicefast_network

  nginx:
    image: nginx:alpine
    container_name: invoicefast_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - invoicefast
    networks:
      - invoicefast_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  invoicefast_data:
  invoicefast_templates:
  invoicefast_logs:
  postgres_data:
  redis_data:

networks:
  invoicefast_network:
    driver: bridge
