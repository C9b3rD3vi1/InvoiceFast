# Prometheus configuration for InvoiceFast

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'invoicefast'
    static_configs:
      - targets: ['invoicefast:8082']
    metrics_path: '/metrics'

# Alert rules
groups:
  - name: invoicefast.rules
    interval: 30s
    rules:
      - alert: InvoiceFastDown
        expr: up{job="invoicefast"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "InvoiceFast is down"
          description: "InvoiceFast has been down for more than 2 minutes"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 10% for 5 minutes"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time"
          description: "95th percentile response time is above 2 seconds"
