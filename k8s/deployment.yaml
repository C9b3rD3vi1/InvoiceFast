---
apiVersion: v1
kind: ConfigMap
metadata:
  name: invoicefast-config
  namespace: invoicefast
data:
  DB_PATH: "/app/data/invoicefast.db"
  NODE_ENV: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: invoicefast-secret
  namespace: invoicefast
type: Opaque
stringData:
  # Add your secrets here
  # JWT_SECRET: "your-secret"
  # DATABASE_URL: "your-db-url"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoicefast
  namespace: invoicefast
spec:
  replicas: 2
  selector:
    matchLabels:
      app: invoicefast
  template:
    metadata:
      labels:
        app: invoicefast
    spec:
      containers:
      - name: invoicefast
        image: invoicefast:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8082
        envFrom:
        - configMapRef:
            name: invoicefast-config
        - secretRef:
            name: invoicefast-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: templates
          mountPath: /app/templates
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: invoicefast-data
      - name: templates
        persistentVolumeClaim:
          claimName: invoicefast-templates
---
apiVersion: v1
kind: Service
metadata:
  name: invoicefast
  namespace: invoicefast
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8082
    protocol: TCP
  selector:
    app: invoicefast
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: invoicefast
  namespace: invoicefast
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - invoice.simuxtech.com
    secretName: invoicefast-tls
  rules:
  - host: invoice.simuxtech.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: invoicefast
            port:
              number: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: invoicefast-data
  namespace: invoicefast
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: invoicefast-templates
  namespace: invoicefast
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
