<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients | InvoiceFast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/static/js/auth.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-slate-50" x-data="app()">
    <aside class="fixed left-0 top-0 h-full w-64 bg-slate-900 text-white p-4">
        <div class="mb-8"><h1 class="text-xl font-bold">InvoiceFast</h1></div>
        <nav class="space-y-2">
            <a href="/dashboard" class="block py-2 px-4 rounded hover:bg-slate-800">Dashboard</a>
            <a href="/invoices" class="block py-2 px-4 rounded hover:bg-slate-800">Invoices</a>
            <a href="/clients" class="block py-2 px-4 rounded bg-slate-800">Clients</a>
            <a href="/payments" class="block py-2 px-4 rounded hover:bg-slate-800">Payments</a>
            <a href="/settings" class="block py-2 px-4 rounded hover:bg-slate-800">Settings</a>
        </nav>
        <div class="absolute bottom-4 left-4 right-4">
            <button @click="logout()" class="w-full py-2 bg-red-600 rounded hover:bg-red-700">Logout</button>
        </div>
    </aside>
    <main class="ml-64 p-8">
        <h1 class="text-2xl font-bold text-slate-900">Clients</h1>
        <p class="text-slate-500 mt-2">Coming soon...</p>
    </main>
    <script>
    function app() { return { init() { if(!InvoiceFastAuth.isAuthenticated()) window.location.href='/login.html'; }, logout() { InvoiceFastAuth.logout(); } }; }
    </script>
</body>
</html>
