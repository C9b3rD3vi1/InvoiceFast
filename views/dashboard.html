<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
    <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-slate-500 text-sm font-medium">Total Invoices</h3>
        <p class="text-3xl font-bold text-slate-900 mt-1">{{.Stats.TotalInvoices}}</p>
    </div>
    <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-slate-500 text-sm font-medium">Paid</h3>
        <p class="text-3xl font-bold text-green-600 mt-1">{{.Stats.PaidInvoices}}</p>
    </div>
    <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-slate-500 text-sm font-medium">Pending</h3>
        <p class="text-3xl font-bold text-yellow-600 mt-1">{{.Stats.PendingInvoices}}</p>
    </div>
    <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-slate-500 text-sm font-medium">Overdue</h3>
        <p class="text-3xl font-bold text-red-600 mt-1">{{.Stats.OverdueInvoices}}</p>
    </div>
</div>

<div class="bg-white p-6 rounded-lg shadow">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-slate-900">Recent Invoices</h2>
        <a href="/dashboard/invoices" class="text-trust hover:underline text-sm font-medium">View all</a>
    </div>
    <div id="invoice-list" hx-get="/htmx/invoices?status={{.Status}}" hx-trigger="load" hx-swap="innerHTML">
        <div class="flex items-center justify-center py-8">
            <svg class="animate-spin h-8 w-8 text-trust" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </div>
    </div>
</div>
