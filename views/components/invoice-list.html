<table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
        <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Invoice #</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Client</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Amount</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Due Date</th>
            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
        </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
        {{range .Invoices}}
        <tr id="invoice-{{.ID}}">
            <td class="px-6 py-4 whitespace-nowrap">{{.InvoiceNumber}}</td>
            <td class="px-6 py-4 whitespace-nowrap">{{.Client.Name}}</td>
            <td class="px-6 py-4 whitespace-nowrap">{{.Total}} {{.Currency}}</td>
            <td class="px-6 py-4 whitespace-nowrap">
                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full 
                    {{if eq .Status \"paid\"}}bg-green-100 text-green-800
                    {{else if eq .Status \"pending\"}}bg-yellow-100 text-yellow-800
                    {{else if eq .Status \"overdue\"}}bg-red-100 text-red-800
                    {{else}}bg-gray-100 text-gray-800{{end}}">
                    {{.Status}}
                </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-gray-500">{{.DueDate}}</td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <a href="/invoices/{{.ID}}" class="text-blue-600 hover:text-blue-900">View</a>
            </td>
        </tr>
        {{else}}
        <tr>
            <td colspan="6" class="px-6 py-4 text-center text-gray-500">No invoices found</td>
        </tr>
        {{end}}
    </tbody>
</table>

<div class="mt-4 flex gap-2">
    <button hx-get="/dashboard/invoices?status=all" hx-target="#invoice-list" 
            class="px-3 py-1 text-sm bg-gray-200 rounded hover:bg-gray-300">All</button>
    <button hx-get="/dashboard/invoices?status=paid" hx-target="#invoice-list"
            class="px-3 py-1 text-sm bg-green-100 rounded hover:bg-green-200">Paid</button>
    <button hx-get="/dashboard/invoices?status=pending" hx-target="#invoice-list"
            class="px-3 py-1 text-sm bg-yellow-100 rounded hover:bg-yellow-200">Pending</button>
    <button hx-get="/dashboard/invoices?status=overdue" hx-target="#invoice-list"
            class="px-3 py-1 text-sm bg-red-100 rounded hover:bg-red-200">Overdue</button>
</div>
