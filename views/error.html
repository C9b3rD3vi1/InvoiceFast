<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Status}}{{.Status}} - {{end}}InvoiceFast</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md mx-auto text-center px-4">
        <div class="text-8xl font-bold text-red-500 mb-4">{{if .Status}}{{.Status}}{{else}}500{{end}}</div>
        <h1 class="text-2xl font-semibold text-gray-800 mb-2">Something went wrong</h1>
        <p class="text-gray-600 mb-6">{{if .Error}}{{.Error}}{{else}}An unexpected error occurred. Please try again later.{{end}}</p>
        <a href="/" class="inline-block px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
            Go Home
        </a>
    </div>
</body>
</html>
