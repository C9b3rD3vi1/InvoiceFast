<div class="p-6 lg:p-8" x-data="paymentsDashboard()" x-init="init()">
    <!-- Header -->
    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 mb-8">
        <div>
            <h1 class="text-2xl lg:text-3xl font-bold text-slate-900">Payments</h1>
            <p class="text-slate-500 text-sm mt-1">Manage and track all payments</p>
        </div>
        <div class="flex items-center gap-3">
            <button @click="reconcilePayments()" :disabled="reconciling" class="px-4 py-2.5 border border-slate-200 rounded-xl hover:bg-slate-50 flex items-center gap-2">
                <template x-if="!reconciling">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </template>
                <template x-if="reconciling">
                    <div class="w-4 h-4 border-2 border-slate-600 border-t-transparent rounded-full animate-spin"></div>
                </template>
                <span x-text="reconciling ? 'Reconciling...' : 'Reconcile'"></span>
            </button>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="bg-white rounded-2xl border border-slate-200 p-6">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 rounded-lg bg-green-100 flex items-center justify-center">
                    <i data-lucide="dollar-sign" class="w-5 h-5 text-green-600"></i>
                </div>
            </div>
            <p class="text-2xl font-bold text-slate-900" x-text="formatCurrency(stats.total_revenue || 0)">KES 0</p>
            <p class="text-sm text-slate-500">Total Revenue</p>
        </div>
        
        <div class="bg-white rounded-2xl border border-slate-200 p-6">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center">
                    <i data-lucide="check-circle" class="w-5 h-5 text-blue-600"></i>
                </div>
            </div>
            <p class="text-2xl font-bold text-slate-900" x-text="formatCurrency(stats.paid_amount || 0)">KES 0</p>
            <p class="text-sm text-slate-500">Paid</p>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 p-6">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 rounded-lg bg-amber-100 flex items-center justify-center">
                    <i data-lucide="clock" class="w-5 h-5 text-amber-600"></i>
                </div>
            </div>
            <p class="text-2xl font-bold text-slate-900" x-text="formatCurrency(stats.pending_amount || 0)">KES 0</p>
            <p class="text-sm text-slate-500">Pending</p>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 p-6">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 rounded-lg bg-red-100 flex items-center justify-center">
                    <i data-lucide="alert-triangle" class="w-5 h-5 text-red-600"></i>
                </div>
            </div>
            <p class="text-2xl font-bold text-slate-900" x-text="stats.fraud_alerts || 0">0</p>
            <p class="text-sm text-slate-500">Fraud Alerts</p>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-2xl border border-slate-200 p-4 mb-6">
        <div class="flex flex-wrap items-center gap-4">
            <select x-model="filters.status" @change="loadPayments()" class="px-4 py-2.5 rounded-xl border border-slate-200">
                <option value="">All Status</option>
                <option value="success">Success</option>
                <option value="pending">Pending</option>
                <option value="failed">Failed</option>
            </select>
            <input type="text" x-model="filters.search" @input="debounce(loadPayments, 300)" placeholder="Search..." class="px-4 py-2.5 rounded-xl border border-slate-200">
            <button @click="clearFilters()" class="px-4 py-2.5 text-slate-600 hover:text-slate-900">Clear</button>
        </div>
    </div>

    <!-- Payments Table -->
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Invoice</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Client</th>
                        <th class="px-6 py-3 text-right text-xs font-semibold text-slate-500 uppercase">Amount</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Method</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Date</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <template x-for="payment in payments" :key="payment.id">
                        <tr class="hover:bg-slate-50/50">
                            <td class="px-6 py-4">
                                <p class="font-medium text-slate-900" x-text="payment.invoice?.invoice_number || '-'">-</p>
                                <p class="text-xs text-slate-500" x-text="payment.reference || '-'">-</p>
                            </td>
                            <td class="px-6 py-4">
                                <p class="text-sm text-slate-900" x-text="payment.invoice?.client?.name || payment.phone_number || '-'">-</p>
                            </td>
                            <td class="px-6 py-4 text-right font-medium" x-text="formatCurrency(payment.amount)">KES 0</td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 rounded-full text-xs font-medium" :class="getMethodClass(payment.method)" x-text="payment.method || 'mpesa'">-</span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 rounded-full text-xs font-medium" :class="getStatusClass(payment.status)" x-text="payment.status">-</span>
                                <template x-if="payment.fraud_score > 30">
                                    <span class="ml-1 px-2 py-1 rounded-full text-xs font-medium bg-red-100 text-red-700">Fraud</span>
                                </template>
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-500" x-text="formatDate(payment.created_at)">-</td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-2">
                                    <template x-if="payment.status === 'pending'">
                                        <button @click="initiatePayment(payment)" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg" title="Retry Payment">
                                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                                        </button>
                                    </template>
                                    <template x-if="payment.status === 'success'">
                                        <button class="p-2 text-slate-600 hover:bg-slate-50 rounded-lg" title="View Details">
                                            <i data-lucide="eye" class="w-4 h-4"></i>
                                        </button>
                                    </template>
                                </div>
                            </td>
                        </tr>
                    </template>
                    <template x-if="payments.length === 0">
                        <tr>
                            <td colspan="7" class="px-6 py-12 text-center text-slate-500">
                                No payments found
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="px-6 py-4 border-t border-slate-200 flex items-center justify-between">
            <p class="text-sm text-slate-500">Showing <span x-text="payments.length"></span> of <span x-text="total"></span> payments</p>
            <div class="flex items-center gap-2">
                <button @click="prevPage()" :disabled="offset === 0" class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm hover:bg-slate-50 disabled:opacity-50">Previous</button>
                <button @click="nextPage()" :disabled="offset + limit >= total" class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm hover:bg-slate-50 disabled:opacity-50">Next</button>
            </div>
        </div>
    </div>
</div>

<script>
function paymentsDashboard() {
    return {
        loading: true,
        payments: [],
        total: 0,
        limit: 20,
        offset: 0,
        reconciling: false,
        stats: {},
        filters: {
            status: '',
            search: ''
        },

        async init() {
            if (!requireAuth()) return;
            lucide.createIcons();
            await this.loadStats();
            await this.loadPayments();
        },

        async loadStats() {
            try {
                const data = await InvoiceFastAPI.payments.stats();
                this.stats = data;
            } catch(err) {
                console.error('Failed to load stats:', err);
            }
        },

        async loadPayments() {
            this.loading = true;
            try {
                const params = new URLSearchParams();
                params.append('limit', this.limit);
                params.append('offset', this.offset);
                if (this.filters.status) params.append('status', this.filters.status);

                const data = await InvoiceFastAPI.payments.list(params.toString());
                this.payments = data.payments || [];
                this.total = data.total || 0;
            } catch(err) {
                console.error('Failed to load payments:', err);
                this.showToast('Failed to load payments', 'error');
            } finally {
                this.loading = false;
                lucide.createIcons();
            }
        },

        async reconcilePayments() {
            this.reconciling = true;
            try {
                await InvoiceFastAPI.payments.reconcile();
                this.showToast('Reconciliation complete', 'success');
                await this.loadPayments();
                await this.loadStats();
            } catch(err) {
                this.showToast('Reconciliation failed', 'error');
            } finally {
                this.reconciling = false;
            }
        },

        async initiatePayment(payment) {
            if (!payment.invoice_id) {
                this.showToast('No invoice linked', 'error');
                return;
            }
            try {
                await InvoiceFastAPI.payments.create({
                    invoice_id: payment.invoice_id,
                    amount: payment.amount,
                    provider: 'mpesa'
                });
                this.showToast('Payment initiated', 'success');
                await this.loadPayments();
            } catch(err) {
                this.showToast(err.message || 'Failed to initiate payment', 'error');
            }
        },

        prevPage() {
            this.offset = Math.max(0, this.offset - this.limit);
            this.loadPayments();
        },

        nextPage() {
            this.offset += this.limit;
            this.loadPayments();
        },

        clearFilters() {
            this.filters.status = '';
            this.filters.search = '';
            this.offset = 0;
            this.loadPayments();
        },

        debounce(fn, delay) {
            clearTimeout(this._debounce);
            this._debounce = setTimeout(fn, delay);
        },

        formatCurrency(amount) {
            return new Intl.NumberFormat('en-KE', { 
                style: 'currency', 
                currency: 'KES',
                minimumFractionDigits: 0 
            }).format(amount || 0);
        },

        formatDate(date) {
            if (!date) return '-';
            return new Date(date).toLocaleDateString('en-KE', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        },

        getMethodClass(method) {
            const classes = {
                'mpesa': 'bg-green-100 text-green-700',
                'stripe': 'bg-purple-100 text-purple-700',
                'bank': 'bg-blue-100 text-blue-700'
            };
            return classes[method] || 'bg-slate-100 text-slate-700';
        },

        getStatusClass(status) {
            const classes = {
                'success': 'bg-green-100 text-green-700',
                'pending': 'bg-amber-100 text-amber-700',
                'failed': 'bg-red-100 text-red-700'
            };
            return classes[status] || 'bg-slate-100 text-slate-700';
        },

        showToast(message, type = 'info') {
            this.toast = { show: true, message, type };
            setTimeout(() => this.toast.show = false, 3000);
        }
    };
}
</script>
