<!DOCTYPE html>
<html lang="en" x-data="notificationSystem()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | InvoiceFast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/static/js/api.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trust: { DEFAULT: '#0277BD', light: '#039BE5', dark: '#01579B' },
                        slate: { 850: '#1e293b', 900: '#0f172a' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    animation: { 'fade-in': 'fadeIn 0.2s ease-out' },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        [x-cloak] { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); }
        .card-shine { position: relative; overflow: hidden; }
        .card-shine::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%); pointer-events: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 h-full w-64 bg-white border-r border-slate-200 z-40">
        <div class="p-6">
            <a href="/dashboard" class="flex items-center gap-2">
                <img src="/images/logo/logo.png" alt="InvoiceFast" class="h-8">
            </a>
        </div>
        
        <nav class="px-3 space-y-1">
            <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span>Dashboard</span>
            </a>
            <a href="/invoices" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">
                <i data-lucide="file-text" class="w-5 h-5"></i>
                <span>Invoices</span>
            </a>
            <a href="/clients" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span>Clients</span>
            </a>
            <a href="/payments" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">
                <i data-lucide="credit-card" class="w-5 h-5"></i>
                <span>Payments</span>
            </a>
            <a href="/reports" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">
                <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                <span>Reports</span>
            </a>
            <a href="/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">
                <a href="/billing" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                    <span>Billing</span>
                </a>
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span>Settings</span>
            </a>
            <a href="/automations" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">
                <i data-lucide="zap" class="w-5 h-5"></i>
                <span>Automations</span>
            </a>
            <a href="/notifications" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-trust text-white">
                <i data-lucide="bell" class="w-5 h-5"></i>
                <span>Notifications</span>
            </a>
        </nav>

        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-slate-200">
            <div x-data="{ show: false }" class="relative">
                <button @click="show = !show" class="flex items-center gap-3 px-3 py-2.5 w-full rounded-lg text-slate-600 hover:bg-slate-50">
                    <img src="/images/logo/logo.png" class="w-8 h-8 rounded-full bg-slate-200">
                    <div class="text-left">
                        <p class="text-sm font-medium" x-text="user?.name || 'User'"></p>
                        <p class="text-xs text-slate-500" x-text="user?.email || 'user@email.com'"></p>
                    </div>
                </button>
                <div x-show="show" @click.outside="show = false" class="absolute bottom-full left-0 right-0 mb-2 bg-white rounded-lg shadow-lg border border-slate-200 overflow-hidden" style="display: none;">
                    <a href="/profile" class="flex items-center gap-2 px-4 py-3 text-sm text-slate-600 hover:bg-slate-50">
                        <i data-lucide="user" class="w-4 h-4"></i> Profile
                    </a>
                    <button @click="logout()" class="flex items-center gap-2 px-4 py-3 w-full text-sm text-red-600 hover:bg-red-50">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 p-8">
        <div class="max-w-5xl mx-auto">
            <!-- Header -->
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900">Notifications</h1>
                    <p class="text-slate-500 text-sm">Manage your alerts and workspace activity</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input x-model="search" type="text" placeholder="Search..." class="pl-10 pr-4 py-2.5 rounded-xl bg-white border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-trust/30 w-64">
                    </div>
                    <button @click="markAllRead()" class="px-5 py-2.5 bg-trust text-white rounded-xl hover:bg-trust-dark text-sm font-medium">
                        Mark All Read
                    </button>
                </div>
            </div>

            <!-- Categories -->
            <div class="bg-white rounded-2xl border border-slate-200 p-6 mb-6 card-shine">
                <div class="flex gap-2 overflow-x-auto pb-2">
                    <template x-for="cat in categories" :key="cat">
                        <button
                            @click="activeCategory=cat"
                            class="px-4 py-2 rounded-xl text-sm font-medium transition-all whitespace-nowrap"
                            :class="activeCategory===cat ? 'bg-trust text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'">
                            <span x-text="cat"></span>
                            <span class="ml-2 px-2 py-0.5 rounded-full text-xs" :class="activeCategory===cat ? 'bg-white/20 text-white' : 'bg-slate-200 text-slate-600'" x-text="countByCategory(cat)"></span>
                        </button>
                    </template>
                </div>
            </div>

            <!-- Notifications List -->
            <div class="space-y-4">
                <template x-for="group in filteredGroupedNotifications" :key="group.label">
                    <div>
                        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3" x-text="group.label"></h3>
                        <div class="space-y-3">
                            <template x-for="item in group.items" :key="item.id">
                                <div
                                    @click="selected=item"
                                    class="bg-white rounded-2xl border p-5 cursor-pointer transition-all hover:shadow-lg card-shine"
                                    :class="selected?.id===item.id ? 'border-trust ring-2 ring-trust/20' : 'border-slate-200 hover:border-slate-300'">
                                    <div class="flex items-start gap-4">
                                        <div class="w-12 h-12 rounded-xl flex items-center justify-center" :class="item.read ? 'bg-slate-100 text-slate-500' : 'bg-trust/10 text-trust'">
                                            <i :data-lucide="item.icon" class="w-5 h-5"></i>
                                        </div>
                                        <div class="flex-1 min-w-0">
                                            <div class="flex items-center gap-2">
                                                <h3 class="font-semibold text-slate-900" x-text="item.title"></h3>
                                                <span x-show="!item.read" class="w-2 h-2 rounded-full bg-trust"></span>
                                            </div>
                                            <p class="text-sm text-slate-500 mt-1 truncate" x-text="item.message"></p>
                                            <div class="flex items-center gap-2 mt-2 text-xs text-slate-400">
                                                <span x-text="item.time"></span>
                                                <span>•</span>
                                                <span x-text="item.actor"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Empty State -->
            <div x-show="filteredGroupedNotifications.length === 0" class="text-center py-16">
                <div class="w-16 h-16 rounded-full bg-slate-100 flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="bell-off" class="w-8 h-8 text-slate-400"></i>
                </div>
                <h3 class="text-lg font-semibold text-slate-900">No notifications</h3>
                <p class="text-slate-500 text-sm mt-1">You're all caught up!</p>
            </div>
        </div>
    </main>

    <script>
        function notificationSystem() {
            return {
                search: '',
                activeCategory: 'All',
                selected: null,
                user: null,
                notifications: [],
                
                categories: ['All', 'Invoices', 'Payments', 'Clients', 'System'],

                async init() {
                    InvoiceFastAPI.requireAuth();
                    this.loadUser();
                    await this.loadNotifications();
                    this.$nextTick(() => {
                        lucide.createIcons();
                    });
                },

                loadUser() {
                    try {
                        this.user = JSON.parse(localStorage.getItem('user'));
                    } catch (e) {}
                },

                async loadNotifications() {
                    try {
                        const data = await InvoiceFastAPI.request('/tenant/notifications');
                        this.notifications = data.notifications || [];
                    } catch (err) {
                        console.error('Failed to load notifications', err);
                        this.notifications = [];
                    }
                },

                async markAllRead() {
                    try {
                        await InvoiceFastAPI.request('/tenant/notifications/read-all', { method: 'POST' });
                        this.notifications = this.notifications.map(n => ({ ...n, read: true }));
                    } catch (err) {
                        console.error('Failed to mark all read', err);
                    }
                },

                countByCategory(cat) {
                    if (cat === 'All') return this.notifications.length;
                    return this.notifications.filter(n => n.category === cat).length;
                },

                get filteredNotifications() {
                    let filtered = this.notifications;
                    if (this.activeCategory !== 'All') {
                        filtered = filtered.filter(n => n.category === this.activeCategory);
                    }
                    if (this.search) {
                        const s = this.search.toLowerCase();
                        filtered = filtered.filter(n => 
                            n.title.toLowerCase().includes(s) || 
                            n.message.toLowerCase().includes(s)
                        );
                    }
                    return filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                },

                get filteredGroupedNotifications() {
                    const items = this.filteredNotifications;
                    const groups = {};
                    
                    items.forEach(item => {
                        const date = new Date(item.created_at);
                        const today = new Date();
                        const diff = Math.floor((today - date) / (1000 * 60 * 60 * 24));
                        let label;
                        if (diff === 0) label = 'Today';
                        else if (diff === 1) label = 'Yesterday';
                        else if (diff < 7) label = 'This Week';
                        else if (diff < 30) label = 'This Month';
                        else label = 'Earlier';
                        
                        if (!groups[label]) groups[label] = [];
                        groups[label].push(item);
                    });

                    const order = ['Today', 'Yesterday', 'This Week', 'This Month', 'Earlier'];
                    return order.filter(l => groups[l]).map(l => ({ label: l, items: groups[l] }));
                },

                logout() {
                    InvoiceFastAPI.logout();
                }
            }
        }
    </script>
</body>
</html>
