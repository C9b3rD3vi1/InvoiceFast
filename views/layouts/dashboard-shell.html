<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} | InvoiceFast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="https://unpkg.com/nprogress@0.2.0/nprogress.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/nprogress@0.2.0/nprogress.css">
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trust: { DEFAULT: '#0277BD', light: '#039BE5', dark: '#01579B' },
                        success: '#2E7D32',
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    animation: { 'fade-in': 'fadeIn 0.2s ease-out', 'slide-up': 'slideUp 0.3s ease-out' },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        [x-cloak] { display: none !important; }
        #nprogress .bar { background: #0277BD !important; }
        #nprogress .peg { box-shadow: 0 0 10px #0277BD, 0 0 5px #0277BD !important; }
        
        /* Smooth transitions */
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        
        /* Active nav state */
        .nav-active {
            background: linear-gradient(90deg, rgba(2,119,189,0.15) 0%, transparent 100%);
            border-left: 3px solid #0277BD;
        }
    </style>
</head>
<body class="bg-slate-50" x-data="dashboardShell()" x-init="init()">
    <!-- NProgress container -->
    <div id="nprogress" style="display:none;"></div>

    <!-- Initialize Lucide icons -->
    <script>document.addEventListener('DOMContentLoaded', function() { lucide.createIcons(); });</script>

    <div class="flex h-screen overflow-hidden">
        <!-- Mobile Overlay -->
        <div id="sidebar-overlay" 
             class="fixed inset-0 bg-slate-900/50 z-40 lg:hidden hidden"
             onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside id="sidebar" 
               class="fixed lg:static inset-y-0 left-0 z-50 w-64 bg-slate-900 sidebar-transition -translate-x-full lg:translate-x-0 flex flex-col">
            
            <!-- Brand Area -->
            <div class="flex items-center gap-3 px-6 py-5 border-b border-slate-800">
                <img src="/images/logo/logo.png" alt="InvoiceFast" class="h-9 w-auto">
                <div class="flex flex-col">
                    <span class="text-white font-bold text-sm">InvoiceFast</span>
                    <span class="text-slate-400 text-xs">{{.TenantName}}</span>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 px-3 py-4 overflow-y-auto">
                <ul class="space-y-1">
<!-- Dashboard -->
                    <li>
                        <a href="/dashboard" 
                           class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors nav-active">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                            </svg>
                            <span class="font-medium">Dashboard</span>
                        </a>
                    </li>
                    
<!-- Invoices -->
                    <li>
                        <a href="/invoices" 
                           class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            <span class="font-medium">Invoices</span>
                        </a>
                    </li>
                    
<!-- Clients -->
                    <li>
                        <a href="/clients" 
                           class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                            </svg>
                            <span class="font-medium">Clients</span>
                        </a>
                    </li>
                    
<!-- Payments -->
                    <li>
                        <a href="/payments" 
                           class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
                            </svg>
                            <span class="font-medium">Payments</span>
                        </a>
                    </li>
                    
<!-- Expenses -->
                    <li>
                        <a href="/expenses" 
                           class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                             </svg>
                             <span class="font-medium">Expenses</span>
                        </a>
                    </li>
                    
                    <!-- Reports -->
                    <li>
                        <a href="/reports"
                           class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                            </svg>
                            <span class="font-medium">Reports</span>
                        </a>
                    </li>
                    
<!-- Settings -->
                    <li>
                        <a href="/settings" 
                           class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                             </svg>
                             <span class="font-medium">Settings</span>
                        </a>
                    </li>
                </ul>
                
                <!-- Tools Section -->
                <div class="pt-4 pb-2">
                    <p class="px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Tools</p>
                </div>
                
                <ul class="space-y-1">
                    <!-- Billing -->
                    <li>
                        <a href="/settings/billing" 
                           class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
                             </svg>
                             <span class="font-medium">Billing</span>
                        </a>
                    </li>
                    
                    <!-- Pricing -->
                    <li>
                        <a href="/pricing" 
                           class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                             </svg>
                             <span class="font-medium">Pricing</span>
                        </a>
                    </li>
                    
                    <!-- Automations -->
                    <li>
                        <a href="/automations" 
                           class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                             </svg>
                             <span class="font-medium">Automations</span>
                        </a>
                    </li>
                    
                    <!-- Notifications -->
                    <li>
                        <a href="/notifications" 
                           class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.417L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                             </svg>
                             <span class="font-medium">Notifications</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Sidebar Footer -->
            <div class="px-4 py-4 border-t border-slate-800">
                <a href="/logout" class="flex items-center gap-3 px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    <span class="font-medium">Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Bar -->
            <header class="sticky top-0 z-30 bg-white border-b border-slate-200 shadow-sm">
                <div class="flex items-center justify-between px-4 lg:px-6 py-3">
                    <!-- Mobile Menu Button -->
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-600 hover:text-trust">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>

                    <!-- Global Search -->
                    <div class="flex-1 max-w-md mx-4">
                        <div class="relative" x-data="{ open: false }">
                            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                            <input type="text" 
                                   placeholder="Search invoices, clients..." 
                                   @focus="open = true"
                                   @input.debounce.300ms="search($event.target.value)"
                                   @keydown.escape="open = false"
                                   class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-trust focus:border-transparent text-sm">
                            <!-- Search Results Dropdown -->
                            <div x-show="open && (searchResults.invoices.length > 0 || searchResults.clients.length > 0)" 
                                 x-cloak
                                 class="absolute top-full left-0 right-0 mt-1 bg-white rounded-lg shadow-lg border border-slate-200 max-h-80 overflow-y-auto z-50">
                                <template x-if="searchResults.invoices.length > 0">
                                    <div class="p-2 border-b border-slate-100">
                                        <p class="text-xs font-medium text-slate-500 px-2 py-1">Invoices</p>
                                        <template x-for="inv in searchResults.invoices.slice(0, 5)" :key="inv.id">
                                            <a :href="'/invoices/' + inv.id" class="flex items-center gap-2 px-2 py-2 hover:bg-slate-50 rounded">
                                                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                                <div>
                                                    <p class="text-sm font-medium" x-text="inv.number"></p>
                                                    <p class="text-xs text-slate-500" x-text="inv.client_name"></p>
                                                </div>
                                            </a>
                                        </template>
                                    </div>
                                </template>
                                <template x-if="searchResults.clients.length > 0">
                                    <div class="p-2">
                                        <p class="text-xs font-medium text-slate-500 px-2 py-1">Clients</p>
                                        <template x-for="client in searchResults.clients.slice(0, 5)" :key="client.id">
                                            <a :href="'/clients/' + client.id" class="flex items-center gap-2 px-2 py-2 hover:bg-slate-50 rounded">
                                                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                                                <div>
                                                    <p class="text-sm font-medium" x-text="client.name"></p>
                                                    <p class="text-xs text-slate-500" x-text="client.email"></p>
                                                </div>
                                            </a>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- Right Side -->
                    <div class="flex items-center gap-4">
                        <!-- KRA Sync Status -->
                        <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-green-50 rounded-full">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            <span class="text-sm font-medium text-green-700">KRA Sync: OK</span>
                        </div>

                        <!-- Notifications Dropdown -->
                        <div class="relative" x-data="{ open: false }">
                            <button @click="open = !open; if(open) loadNotifications()" @click.outside="open = false" class="p-2 text-slate-600 hover:text-trust relative">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                                </svg>
                                <span x-show="unreadCount > 0" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center" x-text="unreadCount"></span>
                            </button>
                            
                            <!-- Notifications Dropdown -->
                            <div x-show="open" x-cloak class="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-lg border border-slate-200 z-50">
                                <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100">
                                    <h3 class="font-semibold text-slate-900">Notifications</h3>
                                    <a href="/notifications" class="text-xs text-trust hover:underline">View all</a>
                                </div>
                                <div class="max-h-96 overflow-y-auto">
                                    <template x-if="notifications.length === 0">
                                        <div class="p-8 text-center">
                                            <svg class="w-12 h-12 text-slate-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                                            <p class="text-sm text-slate-500">No notifications yet</p>
                                        </div>
                                    </template>
                                    <template x-for="notif in notifications.slice(0, 10)" :key="notif.id">
                                        <div class="px-4 py-3 border-b border-slate-50 hover:bg-slate-50 cursor-pointer" @click="markAsRead(notif)">
                                            <div class="flex items-start gap-3">
                                                <div class="w-2 h-2 rounded-full mt-2" :class="notif.read ? 'bg-slate-200' : 'bg-trust'"></div>
                                                <div class="flex-1">
                                                    <p class="text-sm font-medium text-slate-900" x-text="notif.title"></p>
                                                    <p class="text-xs text-slate-500" x-text="notif.message"></p>
                                                    <p class="text-xs text-slate-400 mt-1" x-text="formatTime(notif.created_at)"></p>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <!-- User Profile Dropdown -->
                        <div class="relative" x-data="{ open: false }">
                            <button @click="open = !open" @click.outside="open = false" class="flex items-center gap-2 p-1.5 hover:bg-slate-100 rounded-lg transition-colors">
                                <div class="w-8 h-8 bg-trust rounded-full flex items-center justify-center">
                                    <span class="text-white font-medium text-sm" x-text="user.initials || '{{.UserInitials}}'">{{.UserInitials}}</span>
                                </div>
                                <svg class="w-4 h-4 text-slate-500 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                                </svg>
                            </button>

                            <!-- Dropdown Menu -->
                            <div x-show="open" x-cloak class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-slate-200 py-1 z-50">
                                <div class="px-4 py-2 border-b border-slate-100">
                                    <p class="text-sm font-medium text-slate-900" x-text="user.name || '{{.UserName}}'">{{.UserName}}</p>
                                    <p class="text-xs text-slate-500" x-text="user.email || '{{.UserEmail}}'">{{.UserEmail}}</p>
                                </div>
                                <a href="/settings/profile" class="flex items-center gap-2 px-4 py-2 text-slate-700 hover:bg-slate-50">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                    </svg>
                                    Profile
                                </a>
                                <a href="/settings" class="flex items-center gap-2 px-4 py-2 text-slate-700 hover:bg-slate-50">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>

                </div>
            </header>

            <!-- Main Content -->
            <main id="dashboard-content" class="flex-1 overflow-y-auto p-4 lg:p-8 bg-slate-50">
                {{embed}}
            </main>

            <!-- Helper Functions -->
            <script>
                function formatCurrency(amount) {
                    if (!amount && amount !== 0) return 'KES 0';
                    return 'KES ' + parseFloat(amount).toLocaleString('en-KE');
                }
                
                function formatPercent(value) {
                    if (!value && value !== 0) return '0%';
                    const percent = parseFloat(value);
                    return percent >= 0 ? '+' + percent.toFixed(1) + '%' : percent.toFixed(1) + '%';
                }
                
                function substr(str, start, end) {
                    if (!str) return '';
                    return str.substring(start, end);
                }
                
                function upper(str) {
                    if (!str) return '';
                    return str.toUpperCase();
                }
            </script>
        </div>
    </div>

    <script>
        // Dashboard shell Alpine.js component
        function dashboardShell() {
            return {
                user: {
                    name: '',
                    email: '',
                    initials: ''
                },
                searchResults: {
                    invoices: [],
                    clients: []
                },
                notifications: [],
                unreadCount: 0,
                searchTimeout: null,

                async init() {
                    // Load user profile and notifications
                    await Promise.all([
                        this.loadUser(),
                        this.loadNotifications()
                    ]);
                    lucide.createIcons();
                },

                async loadUser() {
                    try {
                        const token = localStorage.getItem('token');
                        if (!token) {
                            console.log('No token found');
                            return;
                        }
                        const response = await fetch('/api/v1/tenant/me', {
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + token
                            }
                        });
                        console.log('User API response:', response.status);
                        if (response.ok) {
                            const data = await response.json();
                            console.log('User data:', data);
                            this.user = {
                                name: data.name || '',
                                email: data.email || '',
                                initials: this.getInitials(data.name)
                            };
                        } else {
                            const err = await response.text();
                            console.log('User API error:', err);
                        }
                    } catch(e) {
                        console.log('User load error:', e);
                    }
                },

                async loadNotifications() {
                    try {
                        const response = await fetch('/api/v1/tenant/notifications', {
                            headers: this.getAuthHeaders()
                        });
                        if (response.ok) {
                            const data = await response.json();
                            this.notifications = data.notifications || [];
                            // Calculate unread count
                            this.unreadCount = this.notifications.filter(n => !n.read).length;
                        }
                    } catch(e) {
                        console.log('No notifications');
                    }
                },

                async markAsRead(notif) {
                    if (notif.read) return;
                    try {
                        await fetch('/api/v1/tenant/notifications/' + notif.id + '/read', {
                            method: 'PUT',
                            headers: this.getAuthHeaders()
                        });
                        notif.read = true;
                        this.unreadCount = Math.max(0, this.unreadCount - 1);
                    } catch(e) {}
                },

                formatTime(dateStr) {
                    if (!dateStr) return '';
                    const date = new Date(dateStr);
                    const now = new Date();
                    const diff = now - date;
                    const mins = Math.floor(diff / 60000);
                    if (mins < 1) return 'Just now';
                    if (mins < 60) return mins + 'm ago';
                    const hours = Math.floor(mins / 60);
                    if (hours < 24) return hours + 'h ago';
                    const days = Math.floor(hours / 24);
                    if (days < 7) return days + 'd ago';
                    return date.toLocaleDateString();
                },

                async search(query) {
                    if (!query || query.length < 2) {
                        this.searchResults = { invoices: [], clients: [] };
                        return;
                    }

                    try {
                        const response = await fetch('/api/v1/tenant/search?q=' + encodeURIComponent(query), {
                            headers: this.getAuthHeaders()
                        });
                        if (response.ok) {
                            const data = await response.json();
                            this.searchResults = {
                                invoices: data.invoices || [],
                                clients: data.clients || []
                            };
                        }
                    } catch(e) {
                        // Fallback to direct API calls
                        await this.searchFallback(query);
                    }
                },

                async searchFallback(query) {
                    // Search invoices
                    try {
                        const invResp = await fetch('/api/v1/tenant/invoices?search=' + encodeURIComponent(query), {
                            headers: this.getAuthHeaders()
                        });
                        if (invResp.ok) {
                            const invData = await invResp.json();
                            this.searchResults.invoices = invData.invoices || [];
                        }
                    } catch(e) {}

                    // Search clients
                    try {
                        const clientResp = await fetch('/api/v1/tenant/clients?search=' + encodeURIComponent(query), {
                            headers: this.getAuthHeaders()
                        });
                        if (clientResp.ok) {
                            const clientData = await clientResp.json();
                            this.searchResults.clients = clientData.clients || [];
                        }
                    } catch(e) {}
                },

                getInitials(name) {
                    if (!name) return 'U';
                    return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                },

                getAuthHeaders() {
                    return {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    };
                }
            }
        }

        // Sidebar toggle for mobile
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
