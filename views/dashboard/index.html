<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | InvoiceFast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/static/js/auth.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-slate-50" x-data="dashboard()" x-init="init()">
    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 h-full w-64 bg-slate-900 text-white p-4">
        <div class="mb-8">
            <h1 class="text-xl font-bold">InvoiceFast</h1>
        </div>
        <nav class="space-y-2">
            <a href="/dashboard" class="block py-2 px-4 rounded bg-slate-800">Dashboard</a>
            <a href="/invoices" class="block py-2 px-4 rounded hover:bg-slate-800">Invoices</a>
            <a href="/clients" class="block py-2 px-4 rounded hover:bg-slate-800">Clients</a>
            <a href="/payments" class="block py-2 px-4 rounded hover:bg-slate-800">Payments</a>
            <a href="/settings" class="block py-2 px-4 rounded hover:bg-slate-800">Settings</a>
        </nav>
        <div class="absolute bottom-4 left-4 right-4">
            <button @click="logout()" class="w-full py-2 bg-red-600 rounded hover:bg-red-700">Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 p-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Dashboard</h1>
                <p class="text-slate-500" x-text="tenantName || 'Loading...'"></p>
            </div>
            <div class="flex items-center gap-4">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-sm text-slate-500">Last updated: <span x-text="lastUpdated"></span></span>
            </div>
        </div>

        <!-- Metrics -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-xl p-6 shadow-sm">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-500 text-sm">Total Unpaid</span>
                </div>
                <p class="text-2xl font-bold" x-text="metrics.totalUnpaid || '0'"></p>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-sm">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-500 text-sm">Monthly Revenue</span>
                </div>
                <p class="text-2xl font-bold" x-text="metrics.monthlyRevenue || '0'"></p>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-sm">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-500 text-sm">Active Clients</span>
                </div>
                <p class="text-2xl font-bold" x-text="metrics.activeClients || '0'"></p>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-sm">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-slate-500 text-sm">KRA Success</span>
                </div>
                <p class="text-2xl font-bold" x-text="metrics.kraSuccessRate || '0' + '%'"></p>
            </div>
        </div>

        <!-- Recent Invoices -->
        <div class="bg-white rounded-xl shadow-sm">
            <div class="p-6 border-b">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-semibold">Recent Invoices</h2>
                    <a href="/static/invoices.html" class="text-sm text-blue-600 hover:underline">View all</a>
                </div>
            </div>
            <div class="divide-y">
                <template x-for="invoice in recentInvoices" :key="invoice.id">
                    <div class="p-4 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center">
                                <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                            </div>
                            <div>
                                <p class="font-medium" x-text="invoice.invoiceNumber"></p>
                                <p class="text-sm text-slate-500" x-text="invoice.clientName"></p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-medium" x-text="invoice.amount"></p>
                            <span class="text-xs px-2 py-1 rounded" :class="invoice.statusClass" x-text="invoice.status"></span>
                        </div>
                    </div>
                </template>
                <div x-show="loading" class="p-4 text-center text-slate-500">
                    Loading...
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
