<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - InvoiceFast</title>
    <meta name="description" content="Professional invoicing with M-Pesa integration and KRA e-TIMS compliance">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trust: { DEFAULT: '#0277BD', light: '#039BE5', dark: '#01579B' },
                        success: '#2E7D32',
                        success_light: '#4CAF50',
                    }
                }
            }
        }
    </script>
    <style>
        .page-wrapper { min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="page-wrapper">
        <!-- Navigation -->
        <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <!-- Logo -->
                    <a href="/" class="flex items-center gap-2">
                        <img src="/images/logo/logo.png" alt="InvoiceFast" class="h-10 w-auto">
                    </a>

                    <!-- Desktop Nav -->
                    <div class="hidden md:flex items-center gap-6">
                        <a href="/" class="text-slate-600 hover:text-trust transition-colors font-medium">Home</a>
                        <a href="/#features" class="text-slate-600 hover:text-trust transition-colors font-medium">Features</a>
                        <a href="/#pricing" class="text-slate-600 hover:text-trust transition-colors font-medium">Pricing</a>
                    </div>

                    <!-- Auth Buttons -->
                    <div class="hidden md:flex items-center gap-3">
                        <a href="/login.html" class="text-slate-600 hover:text-trust font-medium px-4 py-2">Login</a>
                    </div>

                    <!-- Mobile Menu Button -->
                    <button class="md:hidden p-2 text-slate-600" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-200 px-4 py-3">
                <a href="/" class="block py-2 text-slate-600 hover:text-trust">Home</a>
                <a href="/#features" class="block py-2 text-slate-600 hover:text-trust">Features</a>
                <a href="/#pricing" class="block py-2 text-slate-600 hover:text-trust">Pricing</a>
                <hr class="my-2 border-slate-200">
                <a href="/login.html" class="block py-2 text-slate-600">Login</a>
            </div>
        </nav>

        <!-- Main Content -->
        <main>
            <div class="w-full max-w-md px-4 py-8">
                <!-- Register Card -->
                <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
                    <div class="text-center mb-8">
                        <h1 class="text-2xl font-bold text-slate-800">Create your account</h1>
                        <p class="text-slate-500 mt-1">Start invoicing in minutes</p>
                    </div>

                    <form id="registerForm" action="/api/v1/auth/register" method="POST">
                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Business Name</label>
                                <input type="text" name="company_name" required 
                                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust focus:border-transparent transition"
                                    placeholder="Your Business Ltd">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                                <input type="email" name="email" required 
                                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust focus:border-transparent transition"
                                    placeholder="you@example.com">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Phone (for M-Pesa)</label>
                                <input type="tel" name="phone" required 
                                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust focus:border-transparent transition"
                                    placeholder="254712345678">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                                <input type="password" name="password" required minlength="8"
                                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust focus:border-transparent transition"
                                    placeholder="Min 8 characters">
                            </div>
                            
                            <button type="submit" 
                                class="w-full bg-trust text-white py-3 rounded-lg font-semibold hover:bg-trust-dark transition-all">
                                Create Account
                            </button>
                        </div>
                    </form>
                    
                    <div class="mt-6 text-center">
                        <p class="text-slate-600">Already have an account? 
                            <a href="/login.html" class="text-trust font-medium hover:underline">Sign in</a>
                        </p>
                    </div>
                </div>
                
                <div class="mt-6 text-center">
                    <a href="/" class="text-slate-500 hover:text-trust text-sm">← Back to home</a>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-slate-900 text-slate-300">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                    <p class="text-sm text-slate-400">&copy; 2026 InvoiceFast. All rights reserved.</p>
                    <div class="flex items-center gap-4">
                        <a href="/privacy.html" class="text-slate-400 hover:text-white text-sm">Privacy</a>
                        <a href="/terms.html" class="text-slate-400 hover:text-white text-sm">Terms</a>
                        <div class="flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full">
                            <svg class="w-4 h-4 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                            </svg>
                            <span class="text-xs font-medium">KRA OSCP Verified</span>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
