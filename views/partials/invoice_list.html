{{range .invoices}}
<div class="flex items-center justify-between p-4 bg-white border border-slate-200 rounded-lg hover:shadow-md transition-shadow">
    <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-slate-100 rounded-lg flex items-center justify-center">
            <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
        </div>
        <div>
            <p class="font-medium text-slate-900">{{.InvoiceNumber}}</p>
            <p class="text-sm text-slate-500">{{.Client.Name}}</p>
            <p class="text-xs text-slate-400">{{.CreatedAt.Format "Jan 02, 2006"}}</p>
        </div>
    </div>
    <div class="text-right">
        <p class="font-bold text-slate-900">{{formatCurrency .Total}}</p>
        <p class="text-sm {{if eq .Status "paid"}}text-green-600{{else if eq .Status "overdue"}}text-red-600{{else}}text-slate-500{{end}}">
            {{.Status}}
        </p>
    </div>
</div>
{{else}}
<div class="text-center py-8">
    <svg class="w-12 h-12 text-slate-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
    </svg>
    <p class="text-slate-500">No invoices found</p>
</div>
{{end}}
