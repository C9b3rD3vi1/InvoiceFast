<!-- Payment Success Status (HTMX swap target) -->
<div class="bg-green-50 border border-green-200 rounded-lg p-6 text-center animate-fade-in">
    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 animate-success-pulse">
        <svg class="w-8 h-8 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
    </div>
    <h3 class="text-xl font-bold text-green-900 mb-2">Payment Successful!</h3>
    <p class="text-green-700 mb-4">Thank you for your payment. Your transaction has been confirmed.</p>

    {{if .Invoice.KRAICN}}
    <div class="bg-white rounded-lg p-4 inline-block mt-2">
        <p class="text-sm text-slate-600 mb-1">KRA e-TIMS ICN</p>
        <p class="font-mono font-bold text-slate-900">{{.Invoice.KRAICN}}</p>
    </div>
    {{end}}

    <div class="flex gap-3 mt-6 justify-center">
        <a href="/invoice/{{.Invoice.MagicToken}}/receipt.pdf" class="btn-trust">
            Download Receipt
        </a>
        <button onclick="window.print()" class="btn-outline">
            Print
        </button>
    </div>
</div>

<script>
    // Auto-redirect to success page after 2 seconds
    setTimeout(() => {
        window.location.href = '/invoice/{{.Invoice.MagicToken}}/success';
    }, 2000);
</script>
