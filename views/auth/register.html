<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - InvoiceFast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trust: { DEFAULT: '#0277BD', light: '#039BE5', dark: '#01579B' },
                    }
                }
            }
        }
    </script>
    <style>
        .page-wrapper { min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="page-wrapper">
        <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <a href="/" class="flex items-center gap-2">
                        <img src="/images/logo/logo.png" alt="InvoiceFast" class="h-10 w-auto">
                    </a>
                    <div class="hidden md:flex items-center gap-6">
                        <a href="/" class="text-slate-600 hover:text-trust transition-colors font-medium">Home</a>
                        <a href="/#features" class="text-slate-600 hover:text-trust transition-colors font-medium">Features</a>
                        <a href="/#pricing" class="text-slate-600 hover:text-trust transition-colors font-medium">Pricing</a>
                    </div>
                    <div class="hidden md:flex items-center gap-3">
                        <a href="/login" class="text-slate-600 hover:text-trust font-medium px-4 py-2">Login</a>
                    </div>
                    <button class="md:hidden p-2 text-slate-600" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-200 px-4 py-3">
                <a href="/" class="block py-2 text-slate-600">Home</a>
                <a href="/#features" class="block py-2 text-slate-600">Features</a>
                <a href="/#pricing" class="block py-2 text-slate-600">Pricing</a>
                <hr class="my-2 border-slate-200">
                <a href="/login" class="block py-2 text-slate-600">Login</a>
            </div>
        </nav>

        <main>
            <div class="w-full max-w-md px-4 py-8">
                <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
                    <div class="text-center mb-8">
                        <h1 class="text-2xl font-bold text-slate-800">Create your account</h1>
                        <p class="text-slate-500 mt-1">Start invoicing in minutes</p>
                    </div>

                    <form id="registerForm">
                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Full Name</label>
                                <input type="text" name="name" id="name" required 
                                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust focus:border-transparent transition"
                                    placeholder="John Doe">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Business Name</label>
                                <input type="text" name="company" id="company" required 
                                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust focus:border-transparent transition"
                                    placeholder="Your Business Ltd">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                                <input type="email" name="email" id="email" required 
                                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust focus:border-transparent transition"
                                    placeholder="you@example.com">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Phone (for M-Pesa)</label>
                                <input type="tel" name="phone" id="phone" required 
                                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust focus:border-transparent transition"
                                    placeholder="254712345678">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">KRA PIN (Optional)</label>
                                <input type="text" name="kra_pin" id="kra_pin" 
                                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust focus:border-transparent transition"
                                    placeholder="A0000000000">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                                <input type="password" name="password" id="password" required minlength="8"
                                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust focus:border-transparent transition"
                                    placeholder="Min 8 chars with uppercase, number, special">
                                <p class="text-xs text-slate-500 mt-1">Must have: uppercase, lowercase, number, special char (!@#$%...)</p>
                            </div>
                            
                            <div id="errorMessage" class="text-red-600 text-sm text-center hidden"></div>
                            
                            <button type="submit" id="submitBtn"
                                class="w-full bg-trust text-white py-3 rounded-lg font-semibold hover:bg-trust-dark transition-all flex items-center justify-center disabled:opacity-50">
                                <span id="btnText">Create Account</span>
                                <span id="loadingSpinner" class="hidden">
                                    <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                </span>
                            </button>
                        </div>
                    </form>

                    <script>
                        function validatePassword(pw) {
                            if (pw.length < 8) return 'Password must be at least 8 characters';
                            if (!/[A-Z]/.test(pw)) return 'Password must have an uppercase letter';
                            if (!/[a-z]/.test(pw)) return 'Password must have a lowercase letter';
                            if (!/[0-9]/.test(pw)) return 'Password must have a number';
                            if (!/[!@#$%^&*]/.test(pw)) return 'Password must have a special character (!@#$%^&*)';
                            return null;
                        }
                        
                        async function handleRegister(e) {
                            e.preventDefault();
                            
                            const name = document.getElementById('name').value.trim();
                            const company = document.getElementById('company').value.trim();
                            const email = document.getElementById('email').value.trim();
                            const phone = document.getElementById('phone').value.trim();
                            const kra_pin = document.getElementById('kra_pin').value.trim();
                            const password = document.getElementById('password').value;
                            const errorDiv = document.getElementById('errorMessage');
                            const submitBtn = document.getElementById('submitBtn');
                            const btnText = document.getElementById('btnText');
                            const spinner = document.getElementById('loadingSpinner');
                            
                            // Validation
                            if (!name || !company || !email || !phone || !password) {
                                errorDiv.textContent = 'Please fill in all required fields';
                                errorDiv.classList.remove('hidden');
                                return;
                            }
                            
                            if (!email.includes('@') || !email.includes('.')) {
                                errorDiv.textContent = 'Please enter a valid email address';
                                errorDiv.classList.remove('hidden');
                                return;
                            }
                            
                            if (!/^254/.test(phone) && !/^07/.test(phone)) {
                                errorDiv.textContent = 'Phone must start with 254 or 07';
                                errorDiv.classList.remove('hidden');
                                return;
                            }
                            
                            const pwError = validatePassword(password);
                            if (pwError) {
                                errorDiv.textContent = pwError;
                                errorDiv.classList.remove('hidden');
                                return;
                            }
                            
                            errorDiv.classList.add('hidden');
                            submitBtn.disabled = true;
                            btnText.classList.add('hidden');
                            spinner.classList.remove('hidden');
                            
                            try {
                                const res = await fetch('/api/v1/auth/register', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        name,
                                        company_name: company,
                                        email,
                                        phone,
                                        kra_pin,
                                        password
                                    })
                                });
                                
                                const data = await res.json();
                                
                                if (res.ok && data.access_token) {
                                    localStorage.setItem('accessToken', data.access_token);
                                    localStorage.setItem('refreshToken', data.refresh_token);
                                    if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
                                    window.location.href = '/dashboard';
                                    return;
                                }
                                
                                // Handle specific errors
                                if (res.status === 400) {
                                    if (data.error) {
                                        if (data.error.includes('email')) {
                                            errorDiv.textContent = 'This email is already registered';
                                        } else if (data.error.includes('password')) {
                                            errorDiv.textContent = 'Password ' + data.error;
                                        } else {
                                            errorDiv.textContent = data.error;
                                        }
                                    } else {
                                        errorDiv.textContent = 'Please check your information and try again';
                                    }
                                } else if (res.status === 429) {
                                    errorDiv.textContent = 'Too many attempts. Please wait and try again.';
                                } else if (data.error) {
                                    errorDiv.textContent = data.error;
                                } else {
                                    errorDiv.textContent = 'Registration failed. Please try again.';
                                }
                                errorDiv.classList.remove('hidden');
                            } catch(err) {
                                errorDiv.textContent = 'Network error. Please check your connection and try again.';
                                errorDiv.classList.remove('hidden');
                            } finally {
                                submitBtn.disabled = false;
                                btnText.classList.remove('hidden');
                                spinner.classList.add('hidden');
                            }
                        }
                        
                        document.getElementById('registerForm').addEventListener('submit', handleRegister);
                    </script>
                    
                    <div class="mt-6 text-center">
                        <p class="text-slate-600">Already have an account? 
                            <a href="/login" class="text-trust font-medium hover:underline">Sign in</a>
                        </p>
                    </div>
                </div>
                
                <div class="mt-6 text-center">
                    <a href="/" class="text-slate-500 hover:text-trust text-sm">← Back to home</a>
                </div>
            </div>
        </main>

        <footer class="bg-slate-900 text-slate-300">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                    <p class="text-sm text-slate-400">&copy; 2026 InvoiceFast. All rights reserved.</p>
                    <div class="flex items-center gap-4">
                        <a href="/privacy" class="text-slate-400 hover:text-white text-sm">Privacy</a>
                        <a href="/terms" class="text-slate-400 hover:text-white text-sm">Terms</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
