<style>
.auth-center{display:flex;align-items:center;justify-content:center;padding:32px 20px}
.auth-card{max-width:620px;width:100%;padding:32px 36px}
.auth-card .card-title{font-size:22px;margin-bottom:4px}
.auth-card .card-sub{font-size:14px;margin-bottom:24px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;margin-bottom:14px}
.auth-card .field{margin-bottom:0}
.auth-card .field-hint{font-size:10px;margin-top:4px}
</style>

<div class="auth-center">
  <div class="card auth-card">
    <div class="card-title">Create your account</div>
    <p class="card-sub">Start invoicing in minutes</p>

    <form id="registerForm">
      <div class="field-row">
        <div class="field">
          <label class="field-label">Full Name</label>
          <input type="text" class="field-input" id="name" placeholder="John Doe" required>
        </div>
        <div class="field">
          <label class="field-label">Business Name</label>
          <input type="text" class="field-input" id="company" placeholder="Your Business Ltd" required>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">Email</label>
          <input type="email" class="field-input" id="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label class="field-label">Phone (for M-Pesa)</label>
          <input type="tel" class="field-input" id="phone" placeholder="254712345678" required>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">KRA PIN <span style="color:var(--faint)">(optional)</span></label>
          <input type="text" class="field-input" id="kra_pin" placeholder="A0000000000">
        </div>
        <div class="field">
          <label class="field-label">Default Currency</label>
          <select class="field-select" id="currency" required>
            <option value="KES">KES — Kenyan Shilling</option>
            <option value="USD">USD — US Dollar</option>
            <option value="EUR">EUR — Euro</option>
            <option value="GBP">GBP — British Pound</option>
            <option value="TZS">TZS — Tanzanian Shilling</option>
            <option value="UGX">UGX — Ugandan Shilling</option>
            <option value="NGN">NGN — Nigerian Naira</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <input type="password" class="field-input" id="password" placeholder="Min 8 chars with uppercase, number, special" minlength="8" required>
        <div class="field-hint">Must have: uppercase, lowercase, number, special char (!@#$%^&*)</div>
      </div>

      <div id="errorMessage" class="error-msg hidden" style="margin-bottom:12px"></div>

      <button type="submit" id="submitBtn" class="btn-primary">
        <span id="btnText">Create Account</span>
        <svg id="loadingSpinner" class="hidden spinner" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity=".25"/>
          <path d="M12 2a10 10 0 0110 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </button>
    </form>

    <div class="footer-link">
      <span>Already have an account? <a href="/login">Sign in</a></span>
    </div>
    <div class="footer-link"><a href="/">← Back to home</a></div>
  </div>
</div>

<script>
function validatePassword(pw) {
  if (pw.length < 8) return 'Password must be at least 8 characters';
  if (!/[A-Z]/.test(pw)) return 'Password must have an uppercase letter';
  if (!/[a-z]/.test(pw)) return 'Password must have a lowercase letter';
  if (!/[0-9]/.test(pw)) return 'Password must have a number';
  if (!/[!@#$%^&*]/.test(pw)) return 'Password must have a special character (!@#$%^&*)';
  return null;
}

async function handleRegister(e) {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const company = document.getElementById('company').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const kra_pin = document.getElementById('kra_pin').value.trim();
  const currency = document.getElementById('currency').value;
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('errorMessage');
  const submitBtn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('loadingSpinner');

  if (!name || !company || !email || !phone || !password) {
    errorDiv.textContent = 'Please fill in all required fields';
    errorDiv.classList.remove('hidden'); return;
  }
  if (!email.includes('@') || !email.includes('.')) {
    errorDiv.textContent = 'Please enter a valid email address';
    errorDiv.classList.remove('hidden'); return;
  }
  if (!/^254/.test(phone) && !/^07/.test(phone)) {
    errorDiv.textContent = 'Phone must start with 254 or 07';
    errorDiv.classList.remove('hidden'); return;
  }
  const pwError = validatePassword(password);
  if (pwError) { errorDiv.textContent = pwError; errorDiv.classList.remove('hidden'); return; }

  errorDiv.classList.add('hidden');
  submitBtn.disabled = true;
  btnText.classList.add('hidden');
  spinner.classList.remove('hidden');

  try {
    const res = await fetch('/api/v1/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, company_name: company, email, phone, kra_pin, currency, password })
    });
    const data = await res.json();
    if (res.ok && data.access_token) {
      localStorage.setItem('accessToken', data.access_token);
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('refreshToken', data.refresh_token);
      if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/dashboard';
      return;
    }
    if (res.status === 400) {
      if (data.error && data.error.includes('email')) errorDiv.textContent = 'This email is already registered';
      else errorDiv.textContent = data.error || 'Please check your information and try again';
    } else if (res.status === 429) errorDiv.textContent = 'Too many attempts. Please wait and try again.';
    else errorDiv.textContent = data.error || 'Registration failed. Please try again.';
    errorDiv.classList.remove('hidden');
  } catch {
    errorDiv.textContent = 'Network error. Please check your connection and try again.';
    errorDiv.classList.remove('hidden');
  } finally {
    submitBtn.disabled = false;
    btnText.classList.remove('hidden');
    spinner.classList.add('hidden');
  }
}
document.getElementById('registerForm').addEventListener('submit', handleRegister);
</script>
