<style>
.auth-center{display:flex;align-items:center;justify-content:center;padding:40px 20px}
.auth-card{max-width:440px;width:100%}
</style>

<div class="auth-center">
  <div class="card auth-card">
    <div class="card-title">Welcome back</div>
    <p class="card-sub">Sign in to your account</p>

    <form id="loginForm">
      <div class="field">
        <label class="field-label">Email</label>
        <input type="email" class="field-input" id="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <input type="password" class="field-input" id="password" placeholder="Enter your password" required>
      </div>
      <div class="footer-link" style="text-align:right;margin-top:-8px;margin-bottom:20px">
        <a href="/forgot-password">Forgot password?</a>
      </div>

      <div id="errorMessage" class="error-msg hidden"></div>

      <button type="submit" id="submitBtn" class="btn-primary">
        <span id="btnText">Sign In</span>
        <svg id="loadingSpinner" class="hidden spinner" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity=".25"/>
          <path d="M12 2a10 10 0 0110 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </button>
    </form>

    <div class="footer-link">
      <span>Don't have an account? <a href="/onboarding">Create one</a></span>
    </div>
    <div class="footer-link"><a href="/">← Back to home</a></div>
  </div>
</div>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('errorMessage');
  const submitBtn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('loadingSpinner');

  if (!email || !password) { errorDiv.textContent = 'Please enter email and password'; errorDiv.classList.remove('hidden'); return; }
  if (!email.includes('@')) { errorDiv.textContent = 'Please enter a valid email address'; errorDiv.classList.remove('hidden'); return; }

  errorDiv.classList.add('hidden');
  submitBtn.disabled = true;
  btnText.classList.add('hidden');
  spinner.classList.remove('hidden');

  try {
    const res = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (res.ok && data.access_token) {
      localStorage.setItem('accessToken', data.access_token);
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('refreshToken', data.refresh_token);
      if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
      const params = new URLSearchParams(window.location.search);
      window.location.href = params.get('redirect') || '/dashboard';
      return;
    }
    if (res.status === 401) errorDiv.textContent = 'Invalid email or password';
    else if (res.status === 429) errorDiv.textContent = 'Too many attempts. Please wait and try again.';
    else errorDiv.textContent = data.error || 'Login failed. Please try again.';
    errorDiv.classList.remove('hidden');
  } catch {
    errorDiv.textContent = 'Network error. Please check your connection and try again.';
    errorDiv.classList.remove('hidden');
  } finally {
    submitBtn.disabled = false;
    btnText.classList.remove('hidden');
    spinner.classList.add('hidden');
  }
}
document.getElementById('loginForm').addEventListener('submit', handleLogin);
</script>
