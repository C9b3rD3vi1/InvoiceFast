<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InvoiceFast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trust: { DEFAULT: '#0277BD', light: '#039BE5', dark: '#01579B' },
                    }
                }
            }
        }
    </script>
    <style>
        .page-wrapper { min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="page-wrapper">
        <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <a href="/" class="flex items-center gap-2">
                        <img src="/images/logo/logo.png" alt="InvoiceFast" class="h-10 w-auto">
                    </a>
                    <div class="hidden md:flex items-center gap-6">
                        <a href="/" class="text-slate-600 hover:text-trust transition-colors font-medium">Home</a>
                        <a href="/#features" class="text-slate-600 hover:text-trust transition-colors font-medium">Features</a>
                        <a href="/#pricing" class="text-slate-600 hover:text-trust transition-colors font-medium">Pricing</a>
                    </div>
                    <div class="hidden md:flex items-center gap-3">
                        <a href="/register" class="bg-trust text-white px-5 py-2 rounded-lg font-semibold hover:bg-trust-dark transition-all">Get Started</a>
                    </div>
                    <button class="md:hidden p-2 text-slate-600" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-200 px-4 py-3">
                <a href="/" class="block py-2 text-slate-600">Home</a>
                <a href="/#features" class="block py-2 text-slate-600">Features</a>
                <a href="/#pricing" class="block py-2 text-slate-600">Pricing</a>
                <hr class="my-2 border-slate-200">
                <a href="/register" class="block py-2 text-trust font-semibold">Get Started</a>
            </div>
        </nav>

        <main>
            <div class="w-full max-w-md px-4 py-8">
                <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
                    <div class="text-center mb-8">
                        <h1 class="text-2xl font-bold text-slate-800">Welcome back</h1>
                        <p class="text-slate-500 mt-1">Sign in to your account</p>
                    </div>

                    <form id="loginForm">
                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                                <input type="email" name="email" id="email" required 
                                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust focus:border-transparent transition"
                                    placeholder="you@example.com">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                                <input type="password" name="password" id="password" required 
                                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust focus:border-transparent transition"
                                    placeholder="Enter your password">
                            </div>
                            
                            <div id="errorMessage" class="text-red-600 text-sm text-center hidden"></div>
                            
                            <button type="submit" id="submitBtn"
                                class="w-full bg-trust text-white py-3 rounded-lg font-semibold hover:bg-trust-dark transition-all flex items-center justify-center disabled:opacity-50">
                                <span id="btnText">Sign In</span>
                                <span id="loadingSpinner" class="hidden">
                                    <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                </span>
                            </button>
                        </div>
                    </form>

                    <script>
                        async function handleLogin(e) {
                            e.preventDefault();
                            
                            const email = document.getElementById('email').value.trim();
                            const password = document.getElementById('password').value;
                            const errorDiv = document.getElementById('errorMessage');
                            const submitBtn = document.getElementById('submitBtn');
                            const btnText = document.getElementById('btnText');
                            const spinner = document.getElementById('loadingSpinner');
                            
                            // Validation
                            if (!email || !password) {
                                errorDiv.textContent = 'Please enter email and password';
                                errorDiv.classList.remove('hidden');
                                return;
                            }
                            
                            if (!email.includes('@')) {
                                errorDiv.textContent = 'Please enter a valid email address';
                                errorDiv.classList.remove('hidden');
                                return;
                            }
                            
                            errorDiv.classList.add('hidden');
                            submitBtn.disabled = true;
                            btnText.classList.add('hidden');
                            spinner.classList.remove('hidden');
                            
                            try {
                                const res = await fetch('/api/v1/auth/login', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ email, password })
                                });
                                
                                const data = await res.json();
                                
                                if (res.ok && data.access_token) {
                                    localStorage.setItem('accessToken', data.access_token);
                                    localStorage.setItem('refreshToken', data.refresh_token);
                                    if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
                                    // Check for redirect param
                                    const params = new URLSearchParams(window.location.search);
                                    const redirect = params.get('redirect') || '/dashboard';
                                    window.location.href = redirect;
                                    return;
                                }
                                
                                // Handle specific errors
                                if (res.status === 401) {
                                    errorDiv.textContent = 'Invalid email or password';
                                } else if (res.status === 429) {
                                    errorDiv.textContent = 'Too many attempts. Please wait and try again.';
                                } else if (data.error) {
                                    errorDiv.textContent = data.error;
                                } else {
                                    errorDiv.textContent = 'Login failed. Please try again.';
                                }
                                errorDiv.classList.remove('hidden');
                            } catch(err) {
                                errorDiv.textContent = 'Network error. Please check your connection and try again.';
                                errorDiv.classList.remove('hidden');
                            } finally {
                                submitBtn.disabled = false;
                                btnText.classList.remove('hidden');
                                spinner.classList.add('hidden');
                            }
                        }
                        
                        document.getElementById('loginForm').addEventListener('submit', handleLogin);
                    </script>
                    
                    <div class="mt-6 text-center">
                        <p class="text-slate-600">Don't have an account? 
                            <a href="/register" class="text-trust font-medium hover:underline">Create one</a>
                        </p>
                    </div>
                </div>
                
                <div class="mt-6 text-center">
                    <a href="/" class="text-slate-500 hover:text-trust text-sm">← Back to home</a>
                </div>
            </div>
        </main>

        <footer class="bg-slate-900 text-slate-300">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                    <p class="text-sm text-slate-400">&copy; 2026 InvoiceFast. All rights reserved.</p>
                    <div class="flex items-center gap-4">
                        <a href="/privacy" class="text-slate-400 hover:text-white text-sm">Privacy</a>
                        <a href="/terms" class="text-slate-400 hover:text-white text-sm">Terms</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
