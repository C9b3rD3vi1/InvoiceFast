{{define "content"}}
<!-- Login Page -->
<div class="min-h-screen bg-gradient-to-br from-trust via-trust-light to-cyan-400 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-2">
                <div class="w-12 h-12 bg-white/20 backdrop-blur-sm rounded-xl flex items-center justify-center">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
                <span class="text-2xl font-bold text-white">InvoiceFast</span>
            </a>
            <p class="text-white/80 mt-2">Sign in to your account</p>
        </div>

        <!-- Login Card -->
        <div class="card p-8 animate-slide-up">
            <!-- Error Container (HTMX target) -->
            <div id="login-error-container"></div>

            <form
                hx-post="/api/v1/auth/login"
                hx-target="#login-error-container"
                hx-swap="innerHTML"
                hx-indicator="#login-loading"
                class="space-y-6"
            >
                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-2">
                        Email Address
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        class="input-field"
                        placeholder="you@company.com"
                        autocomplete="email"
                    >
                </div>

                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-2">
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="input-field"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                    >
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2">
                        <input type="checkbox" name="remember" class="w-4 h-4 text-trust rounded border-slate-300 focus:ring-trust">
                        <span class="text-sm text-slate-600">Remember me</span>
                    </label>
                    <a href="/forgot-password.html" class="text-sm text-trust hover:underline">
                        Forgot password?
                    </a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-trust w-full flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                    </svg>
                    Sign In
                </button>
            </form>

            <!-- Loading Indicator -->
            <div id="login-loading" class="htmx-indicator text-center py-4">
                <div class="spinner mx-auto mb-2"></div>
                <p class="text-slate-600 text-sm">Signing in...</p>
            </div>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-slate-500">Don't have an account?</span>
                </div>
            </div>

            <!-- Register Link -->
            <a href="/register.html" class="btn-outline w-full block text-center">
                Create Account
            </a>
        </div>

        <!-- Footer Links -->
        <div class="text-center mt-6">
            <a href="/" class="text-white/80 hover:text-white text-sm">← Back to home</a>
        </div>
    </div>
</div>

{{define "scripts"}}
<script>
    // Handle login response
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        const errorContainer = document.getElementById('login-error-container');

        if (evt.detail.successful) {
            try {
                const data = JSON.parse(evt.detail.xhr.responseText);
                if (data.access_token) {
                    // Store tokens
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);

                    // Redirect to dashboard
                    window.location.href = '/dashboard';
                    return;
                }
            } catch (e) {
                // Continue to error handling
            }
        }

        // Show error
        if (evt.detail.xhr.status >= 400) {
            try {
                const data = JSON.parse(evt.detail.xhr.responseText);
                errorContainer.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg mb-4 flex items-start gap-2">
                        <svg class="w-5 h-5 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <div>
                            <p class="font-medium">Sign in failed</p>
                            <p class="text-sm">${data.error || 'Invalid email or password'}</p>
                        </div>
                    </div>
                `;
            } catch (e) {
                errorContainer.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg mb-4">
                        <p class="font-medium">Sign in failed</p>
                        <p class="text-sm">Invalid email or password</p>
                    </div>
                `;
            }
        }
    });
</script>
{{end}}
{{end}}
