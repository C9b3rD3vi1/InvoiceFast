<style>
.auth-center{display:flex;align-items:center;justify-content:center;padding:40px 20px}
.auth-card{max-width:440px;width:100%}
.card-icon{
  width:60px;height:60px;border-radius:50%;
  background:var(--gold-dim);border:1px solid var(--gold-border);
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  color:var(--gold);font-size:24px;
}
.card-title,.card-sub{text-align:center}
</style>

<div class="auth-center">
  <div class="card auth-card">
    <div class="card-icon"><i class="fas fa-lock"></i></div>
    <div class="card-title">Forgot Password?</div>
    <p class="card-sub">Enter your email and we'll send you a reset link</p>

    <div id="successMessage" class="success-msg hidden">
      <i class="fas fa-check-circle"></i>
      <p>If that email exists, we've sent a password reset link!</p>
    </div>

    <form id="forgotForm">
      <div class="field">
        <label class="field-label">Email Address</label>
        <input type="email" class="field-input" id="email" placeholder="you@example.com" required>
      </div>

      <div id="errorMessage" class="error-msg hidden"></div>

      <button type="submit" id="submitBtn" class="btn-primary">
        <span id="btnText">Send Reset Link</span>
        <svg id="loadingSpinner" class="hidden spinner" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity=".25"/>
          <path d="M12 2a10 10 0 0110 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </button>
    </form>

    <div class="footer-link">
      <span>Remember your password? <a href="/login">Sign in</a></span>
    </div>
    <div class="footer-link"><a href="/">← Back to home</a></div>
  </div>
</div>

<script>
async function handleForgot(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const errorDiv = document.getElementById('errorMessage');
  const successDiv = document.getElementById('successMessage');
  const submitBtn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('loadingSpinner');

  if (!email || !email.includes('@')) {
    errorDiv.textContent = 'Please enter a valid email address';
    errorDiv.classList.remove('hidden'); return;
  }

  errorDiv.classList.add('hidden');
  successDiv.classList.add('hidden');
  submitBtn.disabled = true;
  btnText.classList.add('hidden');
  spinner.classList.remove('hidden');

  try {
    const res = await fetch('/api/v1/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (res.ok) {
      successDiv.classList.remove('hidden');
      document.getElementById('forgotForm').reset();
    } else if (res.status === 429) {
      errorDiv.textContent = 'Too many attempts. Please wait and try again.';
      errorDiv.classList.remove('hidden');
    } else {
      errorDiv.textContent = data.error || 'Something went wrong. Please try again.';
      errorDiv.classList.remove('hidden');
    }
  } catch {
    errorDiv.textContent = 'Network error. Please check your connection and try again.';
    errorDiv.classList.remove('hidden');
  } finally {
    submitBtn.disabled = false;
    btnText.classList.remove('hidden');
    spinner.classList.add('hidden');
  }
}
document.getElementById('forgotForm').addEventListener('submit', handleForgot);
</script>
