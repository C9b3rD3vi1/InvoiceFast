<style>
.auth-center{display:flex;align-items:center;justify-content:center;padding:40px 20px}
.auth-card{max-width:440px;width:100%}
.card-icon{
  width:60px;height:60px;border-radius:50%;
  background:var(--green-dim);border:1px solid rgba(16,185,129,.25);
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  color:var(--green);font-size:24px;
}
.card-title,.card-sub{text-align:center}
.success-msg .btn-primary{display:inline-flex;width:auto;padding:12px 28px;font-size:14px}
</style>

<div class="auth-center">
  <div class="card auth-card">
    <div class="card-icon"><i class="fas fa-shield-alt"></i></div>
    <div class="card-title">Reset Password</div>
    <p class="card-sub">Enter your new password below</p>

    <div id="successMessage" class="hidden">
      <div class="success-msg" style="display:block;text-align:center">
        <i class="fas fa-check-circle" style="font-size:32px;display:block;margin-bottom:12px"></i>
        <p style="margin-bottom:16px">Password reset successfully!</p>
        <a href="/login" class="btn-primary" style="display:inline-flex;width:auto;padding:12px 28px;font-size:14px">Sign in with new password</a>
      </div>
    </div>

    <form id="resetForm">
      <div class="field">
        <label class="field-label">New Password</label>
        <input type="password" class="field-input" id="password" placeholder="Min 8 chars with uppercase, number, special" minlength="8" required>
        <div class="field-hint">Must have: uppercase, lowercase, number, special char (!@#$%^&*)</div>
      </div>
      <div class="field">
        <label class="field-label">Confirm Password</label>
        <input type="password" class="field-input" id="confirm_password" placeholder="Confirm your password" required>
      </div>

      <div id="errorMessage" class="error-msg hidden"></div>

      <button type="submit" id="submitBtn" class="btn-primary">
        <span id="btnText">Reset Password</span>
        <svg id="loadingSpinner" class="hidden spinner" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity=".25"/>
          <path d="M12 2a10 10 0 0110 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </button>
    </form>

    <div class="footer-link"><a href="/">← Back to home</a></div>
  </div>
</div>

<script>
function validatePassword(pw) {
  if (pw.length < 8) return 'Password must be at least 8 characters';
  if (!/[A-Z]/.test(pw)) return 'Password must have an uppercase letter';
  if (!/[a-z]/.test(pw)) return 'Password must have a lowercase letter';
  if (!/[0-9]/.test(pw)) return 'Password must have a number';
  if (!/[!@#$%^&*]/.test(pw)) return 'Password must have a special character (!@#$%^&*)';
  return null;
}

async function handleReset(e) {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm_password').value;
  const errorDiv = document.getElementById('errorMessage');
  const successDiv = document.getElementById('successMessage');
  const formDiv = document.getElementById('resetForm');
  const submitBtn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('loadingSpinner');

  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    errorDiv.textContent = 'Invalid reset link. Please request a new password reset.';
    errorDiv.classList.remove('hidden'); return;
  }
  if (!password || !confirmPassword) {
    errorDiv.textContent = 'Please fill in all fields';
    errorDiv.classList.remove('hidden'); return;
  }
  if (password !== confirmPassword) {
    errorDiv.textContent = 'Passwords do not match';
    errorDiv.classList.remove('hidden'); return;
  }
  const pwError = validatePassword(password);
  if (pwError) { errorDiv.textContent = pwError; errorDiv.classList.remove('hidden'); return; }

  errorDiv.classList.add('hidden');
  submitBtn.disabled = true;
  btnText.classList.add('hidden');
  spinner.classList.remove('hidden');

  try {
    const res = await fetch('/api/v1/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password, confirm_password: confirmPassword })
    });
    const data = await res.json();
    if (res.ok) {
      formDiv.classList.add('hidden');
      successDiv.classList.remove('hidden');
    } else {
      errorDiv.textContent = data.error || 'Failed to reset password. Please try again.';
      errorDiv.classList.remove('hidden');
    }
  } catch {
    errorDiv.textContent = 'Network error. Please check your connection and try again.';
    errorDiv.classList.remove('hidden');
  } finally {
    submitBtn.disabled = false;
    btnText.classList.remove('hidden');
    spinner.classList.add('hidden');
  }
}
document.getElementById('resetForm').addEventListener('submit', handleReset);
</script>
