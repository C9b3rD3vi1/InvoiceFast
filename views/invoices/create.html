<!DOCTYPE html>
<html lang="en" x-data="invoiceForm()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-text="isEdit ? 'Edit Invoice' : 'New Invoice'">New Invoice - InvoiceFast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trust: { DEFAULT: '#0277BD', light: '#039BE5', dark: '#01579B' },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen" x-init="init()">
    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 h-full w-64 bg-white border-r border-slate-200 z-40">
        <div class="p-6">
            <a href="/" class="flex items-center gap-2">
                <img src="/images/logo/logo.png" alt="InvoiceFast" class="h-8">
            </a>
        </div>
        
        <nav class="px-3 space-y-1">
            <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="/invoices" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                <span>Invoices</span>
            </a>
            <a href="/clients" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7"/></svg>
                <span>Clients</span>
            </a>
            <a href="/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/></svg>
                <span>Settings</span>
            </a>
            <a href="/automations" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50">
                <i data-lucide="zap" class="w-5 h-5"></i>
                <span>Automations</span>
            </a>
        </nav>
        
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-slate-200">
            <button @click="logout()" class="flex items-center gap-3 px-3 py-2.5 w-full rounded-lg text-slate-600 hover:bg-red-50 hover:text-red-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m10 4v-2a2 2 0 00-2-2H5a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2m4-4l4 4"/></svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 p-8">
        <header class="flex items-center justify-between mb-8">
            <div>
                <a href="/invoices" class="text-slate-500 hover:text-trust text-sm flex items-center gap-1 mb-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Back to Invoices
                </a>
                <h1 class="text-2xl font-bold text-slate-900" x-text="isEdit ? 'Edit Invoice' : 'New Invoice'">New Invoice</h1>
            </div>
            <div class="flex items-center gap-3">
                <button @click="saveInvoice('draft')" :disabled="saving" class="px-5 py-2.5 border border-slate-300 rounded-lg font-medium hover:bg-slate-50 disabled:opacity-50">
                    Save as Draft
                </button>
                <button @click="saveInvoice('sent')" :disabled="saving" class="bg-trust text-white px-5 py-2.5 rounded-lg font-semibold hover:bg-trust-dark disabled:opacity-50">
                    <span x-show="!saving">Create & Send</span>
                    <span x-show="saving">Saving...</span>
                </button>
            </div>
        </header>

        <!-- Error Message -->
        <div x-show="error" class="bg-red-50 text-red-700 px-4 py-3 rounded-lg mb-6" x-text="error"></div>

        <!-- Invoice Form -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Main Form -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Invoice Details -->
                <div class="bg-white rounded-xl border border-slate-200 p-6">
                    <h2 class="font-semibold text-slate-900 mb-4">Invoice Details</h2>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Invoice Number</label>
                            <input type="text" x-model="invoice.invoice_number" readonly class="w-full px-4 py-2 rounded-lg border border-slate-300 bg-slate-50">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Invoice Date</label>
                            <input type="date" x-model="invoice.invoice_date" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Due Date</label>
                            <input type="date" x-model="invoice.due_date" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Currency</label>
                            <select x-model="invoice.currency" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust">
                                <option value="KES">KES - Kenyan Shilling</option>
                                <option value="USD">USD - US Dollar</option>
                                <option value="EUR">EUR - Euro</option>
                                <option value="GBP">GBP - British Pound</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Client -->
                <div class="bg-white rounded-xl border border-slate-200 p-6">
                    <h2 class="font-semibold text-slate-900 mb-4">Client</h2>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Select Client</label>
                        <select x-model="invoice.client_id" @change="selectClient()" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust">
                            <option value="">Select a client...</option>
                            <template x-for="client in clients" :key="client.id">
                                <option :value="client.id" x-text="client.name"></option>
                            </template>
                        </select>
                    </div>
                    
                    <div x-show="selectedClient" class="p-4 bg-slate-50 rounded-lg">
                        <p class="font-medium" x-text="selectedClient.name"></p>
                        <p class="text-sm text-slate-600" x-text="selectedClient.email"></p>
                        <p class="text-sm text-slate-600" x-text="selectedClient.phone"></p>
                    </div>
                </div>

                <!-- Line Items -->
                <div class="bg-white rounded-xl border border-slate-200 p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="font-semibold text-slate-900">Line Items</h2>
                        <button @click="addLineItem()" class="text-trust hover:underline text-sm">+ Add Item</button>
                    </div>
                    
                    <table class="w-full">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="px-3 py-2 text-left text-xs font-medium text-slate-500">Description</th>
                                <th class="px-3 py-2 text-right text-xs font-medium text-slate-500">Qty</th>
                                <th class="px-3 py-2 text-right text-xs font-medium text-slate-500">Price</th>
                                <th class="px-3 py-2 text-right text-xs font-medium text-slate-500">Total</th>
                                <th class="px-3 py-2"></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-200">
                            <template x-for="(item, index) in invoice.items" :key="index">
                                <tr>
                                    <td class="px-3 py-2">
                                        <input type="text" x-model="item.description" placeholder="Description" class="w-full px-2 py-1 rounded border border-slate-300">
                                    </td>
                                    <td class="px-3 py-2">
                                        <input type="number" x-model="item.quantity" @input="calcItem(index)" min="1" class="w-20 px-2 py-1 rounded border border-slate-300 text-right">
                                    </td>
                                    <td class="px-3 py-2">
                                        <input type="number" x-model="item.unit_price" @input="calcItem(index)" min="0" step="0.01" class="w-24 px-2 py-1 rounded border border-slate-300 text-right">
                                    </td>
                                    <td class="px-3 py-2 text-right font-medium" x-text="formatCurrency(item.total)">KES 0</td>
                                    <td class="px-3 py-2">
                                        <button @click="removeLineItem(index)" class="text-red-600 hover:text-red-700">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                        </button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <!-- Notes -->
                <div class="bg-white rounded-xl border border-slate-200 p-6">
                    <h2 class="font-semibold text-slate-900 mb-4">Notes</h2>
                    <textarea x-model="invoice.notes" rows="3" placeholder="Add any notes for the client..." class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-trust"></textarea>
                </div>
            </div>

            <!-- Summary Sidebar -->
            <div class="space-y-6">
                <div class="bg-white rounded-xl border border-slate-200 p-6">
                    <h2 class="font-semibold text-slate-900 mb-4">Summary</h2>
                    
                    <div class="space-y-3">
                        <div class="flex justify-between">
                            <span class="text-slate-600">Subtotal</span>
                            <span class="font-medium" x-text="formatCurrency(subtotal)">KES 0</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-600">Tax (%)</span>
                            <input type="number" x-model="invoice.tax_rate" @input="calcTotals()" min="0" max="100" step="0.1" class="w-20 px-2 py-1 rounded border border-slate-300 text-right">
                        </div>
                        <div class="flex justify-between">
                            <span class="text-slate-600">Tax Amount</span>
                            <span class="font-medium" x-text="formatCurrency(taxAmount)">KES 0</span>
                        </div>
                        <hr class="border-slate-200">
                        <div class="flex justify-between text-lg font-bold">
                            <span>Total</span>
                            <span class="text-trust" x-text="formatCurrency(total)">KES 0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
    function invoiceForm() {
        return {
            saving: false,
            error: null,
            isEdit: false,
            invoice: {
                invoice_number: '',
                invoice_date: new Date().toISOString().split('T')[0],
                due_date: new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0],
                currency: 'KES',
                client_id: '',
                items: [{ description: '', quantity: 1, unit_price: 0, total: 0 }],
                tax_rate: 0,
                notes: '',
            },
            clients: [],
            selectedClient: null,
            
            get subtotal() {
                return this.invoice.items.reduce((sum, item) => sum + (item.quantity * item.unit_price), 0);
            },
            
            get taxAmount() {
                return this.subtotal * (this.invoice.tax_rate / 100);
            },
            
            get total() {
                return this.subtotal + this.taxAmount;
            },
            
            async init() {
                if (!requireAuth()) return;
                
                const path = window.location.pathname;
                if (path === '/invoices/new') {
                    await this.generateInvoiceNumber();
                } else {
                    // Extract invoice ID from URL
                    const parts = path.split('/');
                    const id = parts[parts.length - 1];
                    if (id && id !== 'invoices' && id !== 'new') {
                        this.isEdit = true;
                        await this.loadInvoice(id);
                    }
                }
                
                await this.loadClients();
            },
            
            async generateInvoiceNumber() {
                const year = new Date().getFullYear();
                this.invoice.invoice_number = 'INV-' + year + '-' + String(Math.floor(Math.random() * 900) + 100);
            },
            
            async loadInvoice(id) {
                try {
                    const data = await InvoiceFastAPI.invoices.get(id);
                    this.invoice = {
                        id: data.id,
                        invoice_number: data.invoice_number,
                        invoice_date: data.invoice_date?.split('T')[0] || '',
                        due_date: data.due_date?.split('T')[0] || '',
                        currency: data.currency || 'KES',
                        client_id: data.client_id || '',
                        items: data.items || [{ description: '', quantity: 1, unit_price: 0, total: 0 }],
                        tax_rate: data.tax_rate || 0,
                        notes: data.notes || '',
                        status: data.status,
                    };
                    this.calcAll();
                } catch(err) {
                    this.error = 'Failed to load invoice: ' + err.message;
                }
            },
            
            async loadClients() {
                try {
                    const data = await InvoiceFastAPI.clients.list();
                    this.clients = data.clients || [];
                } catch(err) {
                    console.error('Failed to load clients:', err);
                }
            },
            
            selectClient() {
                this.selectedClient = this.clients.find(c => c.id === this.invoice.client_id) || null;
            },
            
            addLineItem() {
                this.invoice.items.push({ description: '', quantity: 1, unit_price: 0, total: 0 });
            },
            
            removeLineItem(index) {
                if (this.invoice.items.length > 1) {
                    this.invoice.items.splice(index, 1);
                    this.calcTotals();
                }
            },
            
            calcItem(index) {
                const item = this.invoice.items[index];
                item.total = item.quantity * item.unit_price;
                this.calcTotals();
            },
            
            calcAll() {
                this.invoice.items.forEach((item, i) => this.calcItem(i));
            },
            
            calcTotals() {
                this.invoice.items.forEach((item, i) => this.calcItem(i));
            },
            
            async saveInvoice(action) {
                this.saving = true;
                this.error = null;
                
                try {
                    if (!this.invoice.client_id) throw new Error('Please select a client');
                    if (this.invoice.items.every(item => !item.description)) throw new Error('Please add at least one line item');
                    
                    const data = {
                        client_id: this.invoice.client_id,
                        invoice_date: this.invoice.invoice_date,
                        due_date: this.invoice.due_date,
                        currency: this.invoice.currency,
                        items: this.invoice.items.map(item => ({
                            description: item.description,
                            quantity: item.quantity,
                            unit_price: item.unit_price,
                        })),
                        tax_rate: this.invoice.tax_rate,
                        notes: this.invoice.notes,
                    };
                    
                    let result;
                    if (this.isEdit && this.invoice.id) {
                        result = await InvoiceFastAPI.invoices.update(this.invoice.id, data);
                    } else {
                        result = await InvoiceFastAPI.invoices.create(data);
                    }
                    
                    if (action === 'sent' && result.id) {
                        await InvoiceFastAPI.invoices.send(result.id);
                    }
                    
                    window.location.href = '/invoices';
                } catch(err) {
                    this.error = err.message;
                } finally {
                    this.saving = false;
                }
            },
            
            logout() {
                localStorage.removeItem('accessToken');
                localStorage.removeItem('refreshToken');
                localStorage.removeItem('user');
                window.location.href = '/login';
            },
            
            formatCurrency(amount) {
                const currencies = { KES: 'KES', USD: 'USD', EUR: 'EUR', GBP: 'GBP' };
                return new Intl.NumberFormat('en-KE', { style: 'currency', currency: currencies[this.invoice.currency] || 'KES' }).format(amount || 0);
            }
        };
    }
    </script>
</body>
</html>
