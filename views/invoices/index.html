<div class="space-y-6">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Invoices</h1>
            <p class="text-slate-500 text-sm">Manage and track all your invoices</p>
        </div>
        <a href="/dashboard/invoices/new" class="inline-flex items-center gap-2 bg-trust text-white px-5 py-2.5 rounded-lg font-semibold hover:bg-trust-dark transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            New Invoice
        </a>
    </div>

    <!-- Filters & Search -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
        <div class="flex flex-col lg:flex-row lg:items-center gap-4">
            <!-- Live Search -->
            <div class="flex-1 max-w-md">
                <div class="relative">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input type="text" 
                           id="invoice-search"
                           name="q"
                           hx-get="/htmx/invoices/search" 
                           hx-trigger="keyup changed delay:500ms"
                           hx-target="#invoice-table-body"
                           hx-swap="innerHTML"
                           hx-push-url="false"
                           placeholder="Search invoices by number or client..."
                           class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-trust focus:border-transparent text-sm">
                    <div class="htmx-indicator absolute right-3 top-1/2 -translate-y-1/2">
                        <svg class="animate-spin h-5 w-5 text-trust" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Status Filter -->
            <div class="flex items-center gap-2">
                <button hx-get="/htmx/invoices?status=all" 
                        hx-target="#invoice-table-body"
                        hx-swap="innerHTML"
                        class="status-filter px-4 py-2 text-sm font-medium rounded-lg transition-colors bg-trust text-white">
                    All
                </button>
                <button hx-get="/htmx/invoices?status=draft" 
                        hx-target="#invoice-table-body"
                        hx-swap="innerHTML"
                        class="status-filter px-4 py-2 text-sm font-medium rounded-lg text-slate-600 hover:bg-slate-100 transition-colors">
                    Draft
                </button>
                <button hx-get="/htmx/invoices?status=sent" 
                        hx-target="#invoice-table-body"
                        hx-swap="innerHTML"
                        class="status-filter px-4 py-2 text-sm font-medium rounded-lg text-slate-600 hover:bg-slate-100 transition-colors">
                    Sent
                </button>
                <button hx-get="/htmx/invoices?status=paid" 
                        hx-target="#invoice-table-body"
                        hx-swap="innerHTML"
                        class="status-filter px-4 py-2 text-sm font-medium rounded-lg text-slate-600 hover:bg-slate-100 transition-colors">
                    Paid
                </button>
                <button hx-get="/htmx/invoices?status=overdue" 
                        hx-target="#invoice-table-body"
                        hx-swap="innerHTML"
                        class="status-filter px-4 py-2 text-sm font-medium rounded-lg text-slate-600 hover:bg-slate-100 transition-colors">
                    Overdue
                </button>
            </div>
        </div>
    </div>

    <!-- Real-time Status Polling (for pending invoices) -->
    <div hx-get="/htmx/invoices/poll" hx-trigger="every 5s" hx-swap="morph:innerHTML" class="hidden"></div>

    <!-- Invoice Table -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Invoice</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Client</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Amount</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Due Date</th>
                        <th class="px-6 py-3 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="invoice-table-body" hx-get="/htmx/invoices?status=all" hx-trigger="load">
                    <!-- Loading State -->
                    <tr>
                        <td colspan="6" class="px-6 py-12 text-center">
                            <div class="flex items-center justify-center gap-3 text-slate-500">
                                <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                </svg>
                                <span>Loading invoices...</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Empty State (shown when no invoices) -->
        <div id="empty-state" class="hidden">
            <div class="py-16 px-6 text-center">
                <div class="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-12 h-12 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold text-slate-900 mb-2">No Invoices Found</h3>
                <p class="text-slate-500 mb-6 max-w-sm mx-auto">Get started by creating your first invoice. You can also import from WhatsApp or CSV.</p>
                <div class="flex items-center justify-center gap-3">
                    <a href="/dashboard/invoices/new" class="inline-flex items-center gap-2 bg-trust text-white px-5 py-2.5 rounded-lg font-semibold hover:bg-trust-dark transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Create Invoice
                    </a>
                    <button class="inline-flex items-center gap-2 bg-white text-slate-700 border border-slate-300 px-5 py-2.5 rounded-lg font-semibold hover:bg-slate-50 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                        </svg>
                        Import
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div class="flex items-center justify-between">
        <p class="text-sm text-slate-500">Showing <span class="font-medium">1-10</span> of <span class="font-medium">24</span> invoices</p>
        <div class="flex items-center gap-2">
            <button class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 disabled:opacity-50" disabled>
                Previous
            </button>
            <button class="px-4 py-2 text-sm font-medium text-white bg-trust rounded-lg hover:bg-trust-dark">
                1
            </button>
            <button class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50">
                2
            </button>
            <button class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50">
                3
            </button>
            <button class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50">
                Next
            </button>
        </div>
    </div>
</div>

<!-- Invoice Row Template (for HTMX replacement) -->
<template id="invoice-row-template">
    {{range .Invoices}}
    <tr class="hover:bg-slate-50 transition-colors border-b border-slate-100">
        <td class="px-6 py-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-trust/10 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-trust" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
                <div>
                    <p class="font-medium text-slate-900">{{.InvoiceNumber}}</p>
                    <p class="text-xs text-slate-500">{{.CreatedAt}}</p>
                </div>
            </div>
        </td>
        <td class="px-6 py-4">
            <p class="font-medium text-slate-900">{{.ClientName}}</p>
            <p class="text-xs text-slate-500">{{.ClientEmail}}</p>
        </td>
        <td class="px-6 py-4">
            <p class="font-semibold text-slate-900">{{.Total}}</p>
        </td>
        <td class="px-6 py-4">
            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium {{.StatusClass}}">
                {{.Status}}
            </span>
        </td>
        <td class="px-6 py-4">
            <p class="text-sm text-slate-600">{{.DueDate}}</p>
        </td>
        <td class="px-6 py-4 text-right">
            <div class="relative inline-block">
                <button onclick="toggleActionMenu(this)" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="5" r="1.5"/>
                        <circle cx="12" cy="12" r="1.5"/>
                        <circle cx="12" cy="19" r="1.5"/>
                    </svg>
                </button>
                <div class="action-menu hidden absolute right-0 mt-1 w-48 bg-white rounded-lg shadow-lg border border-slate-200 py-1 z-50">
                    <a href="/dashboard/invoices/{{.ID}}" class="flex items-center gap-2 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        View Details
                    </a>
                    <button class="w-full flex items-center gap-2 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                        </svg>
                        Copy Magic Link
                    </button>
                    <button class="w-full flex items-center gap-2 px-4 py-2 text-sm text-green-700 hover:bg-green-50">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                        </svg>
                        Send WhatsApp
                    </button>
                    <a href="/dashboard/invoices/{{.ID}}/pdf" class="flex items-center gap-2 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        Download PDF
                    </a>
                    <hr class="my-1 border-slate-100">
                    <button class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                        Void (KRA Credit)
                    </button>
                </div>
            </div>
        </td>
    </tr>
    {{else}}
    <tr>
        <td colspan="6" class="px-6 py-12">
            <div class="text-center">
                <div class="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-12 h-12 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold text-slate-900 mb-2">No Invoices Found</h3>
                <p class="text-slate-500 mb-6">Create your first invoice to get started.</p>
                <a href="/dashboard/invoices/new" class="inline-flex items-center gap-2 bg-trust text-white px-5 py-2.5 rounded-lg font-semibold hover:bg-trust-dark transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Create Invoice
                </a>
            </div>
        </td>
    </tr>
    {{end}}
</template>

<script>
    // Toggle action menu
    function toggleActionMenu(button) {
        const menu = button.nextElementSibling;
        menu.classList.toggle('hidden');
        
        // Close on outside click
        document.addEventListener('click', function closeMenu(e) {
            if (!button.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.add('hidden');
                document.removeEventListener('click', closeMenu);
            }
        });
    }

    // Status filter styling
    document.querySelectorAll('.status-filter').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.status-filter').forEach(b => {
                b.classList.remove('bg-trust', 'text-white');
                b.classList.add('text-slate-600', 'hover:bg-slate-100');
            });
            this.classList.remove('text-slate-600', 'hover:bg-slate-100');
            this.classList.add('bg-trust', 'text-white');
        });
    });

    // Handle empty state
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id === 'invoice-table-body') {
            const tbody = evt.detail.target;
            if (tbody.children.length === 0 || (tbody.children.length === 1 && tbody.children[0].innerText.includes('No'))) {
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
            }
        }
    });
</script>
